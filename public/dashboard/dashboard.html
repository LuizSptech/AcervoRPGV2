<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="icon" href="./assets/imagens/rpg.png" />
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboards</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="janela">
        <div class="header-left">
            <h1>ACERVORPG</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario"></span>!</h3>
            </div>

            
            <div class="btn-nav">
                
                <h3>Gráficos</h3>
                
            </div>
            
            <div class="btn-nav-white">
                <a href="Feed.html"l>
                    <h3>Feed</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Postar</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="sair()">
                <h3>Sair</h3>
            </div>

        </div>
    </div>
    <div class="main">

        <div class="cards">
            <div class="card">
                <h2>Esteriotipo</h2>
                <div id="esteriotipo"></div>
            </div>
        </div>
        <div class="grupo-graficos">

            <div class="card-pie">
                <div class="grafico-pie">
                    <canvas id="grafico-rosquinha"></canvas>
                </div>
            </div>
            
            <div class="card-barra">
                <div class="grafico">
                    <canvas id="grafico-barra" ></canvas>
                </div>
            </div>
        </div>
        <div class="KPIS">
            <div class="KPI1">
                <p>Você faz parte de </p>
                <div id="saida"></div>
                <p>da comunidade</p>
            </div>
            <div class="KPI2">
                <p>Numero total de post realizados</p>
                <div id="total"></div>
                
            </div>
            <div class="KPI3">
                <p>post no último mês</p>
                <div id="ultimo_mes"></div>

            </div>
        </div>
    </div>
</body>

</html>


 
 <script>
 
 
 function sair() {
        sessionStorage.clear();
        window.location = "../login.html";
    }
 
 
 
const nome = sessionStorage.NOME_USUARIO;
const id_usuario = sessionStorage.ID_USUARIO;
 
b_usuario.innerHTML = `${nome}`
 
fetch(`/quizz/puxar?id_usuario=${id_usuario}`)
    .then(function (resposta) {
        if (!resposta.ok) {
            throw new Error("Erro ao buscar dados do dash");
        }
        return resposta.json();
    })
    .then(function (dados) {
 
        console.log("Dados recebidos do dash:", dados)
 
        
        esteriotipo.innerHTML = dados.tipoAtual ? dados.tipoAtual.toLowerCase() : "indefinido"
 
        // KPI1 
        saida.innerHTML = `${dados.porcentagem}%`
 
        // KPI2
        total.innerHTML = `${dados.totalPosts}`
 
        // KPI3 
        ultimo_mes.innerHTML = `${dados.postsUltimoMes}`
 
        // Gráfico de barra 
        const labelsPosts = []
        const valoresPosts = []
        for (let i = 0; i < dados.distribuicaoPosts.length; i++) {
            labelsPosts.push(dados.distribuicaoPosts[i].nome)
            valoresPosts.push(dados.distribuicaoPosts[i].quantidade)
        }
 
        // Gráfico de pizza
        const labelsUsuarios = []
        const valoresUsuarios = []
        for (let i = 0; i < dados.distribuicaoUsuarios.length; i++) {
            labelsUsuarios.push(dados.distribuicaoUsuarios[i].nome)
            valoresUsuarios.push(dados.distribuicaoUsuarios[i].quantidade)
        }
 
        montarGraficos(labelsPosts, valoresPosts, labelsUsuarios, valoresUsuarios)
    })
    .catch(function (erro) {
        console.log("Erro:", erro)
    })
 
function montarGraficos(labelsPosts, valoresPosts, labelsUsuarios, valoresUsuarios) {
 
    const data = {
        labels: labelsPosts,
        datasets: [{
            label: 'Esteriotipos com mais post',
            data: valoresPosts,
            backgroundColor: [
                '#ff8902',
                '#e9100f',
                '#ad8565',
                '#0078d7',
                '#107c11'
                
            ],
            borderColor: [
                '#ff8902',
                '#e9100f',
                '#ad8565',
                '#0078d7',
                '#107c11'
                
            ],
            borderWidth: 1,
            houverOffset: 4
        }]
    };
 
    new Chart(document.getElementById("grafico-barra"), {
        type: 'bar',
        data: data,
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
 
    const info = {
        labels: labelsUsuarios,
        datasets: [{
            label: 'Usuários por tipo',
            data: valoresUsuarios,
            backgroundColor: [
                '#ff8902',
                '#e9100f',
                '#ad8565',
                '#0078d7',
                '#107c11',
                '#1a1a1a'
            ],
            houverOffset: 4
        }]
    }
 
    new Chart(document.getElementById("grafico-rosquinha"), {
        type: 'pie',
        data: info,
    });
}
 

 
</script>
