<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTech | Dashboards</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="janela">
        <div class="header-left">
            <h1>ACERVORPG</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./cards.html">
                    <h3>Aquários e Terrários</h3>
                </a>
            </div>

            <div class="btn-nav">

                <h3>Gráficos</h3>

            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Mural de Avisos</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>
    </div>
    <div class="main">

        <div class="cards">
            <div class="card">
                <h2>Esteriotipo</h2>
                <div id="esteriotipo">Mestre</div>
            </div>
        </div>
        <div class="grupo-graficos">

            <div class="card-pie">
                <div class="grafico-pie">
                    <canvas id="grafico-rosquinha"></canvas>
                </div>
            </div>
            
            <div class="card-barra">
                <div class="grafico">
                    <canvas id="grafico-barra" ></canvas>
                </div>
            </div>
        </div>
        <div class="KPIS">
            <div class="KPI1">
                <p>Você faz parte de </p>
                <div id="saida"></div>
                <p>da comunidade</p>
            </div>
            <div class="KPI2">
                <p>Numero total de post realizados</p>
                <div id="total"></div>
                
            </div>
            <div class="KPI3">
                <p></p>

            </div>
        </div>
    </div>
</body>

</html>


<script>



saida.innerHTML = `16%`
total.innerHTML = `8`
const labels = [
        'Protagonista',
        'Combatente',
        'Advogado de Regras',
        'Narrador',
        'Suporte',
        'Mestre'
    ];

const data = {
    labels: labels,
    datasets: [{
        label: 'Post feitos',
        data: [65, 59, 80, 81, 56, 55, 40],
        backgroundColor: [
            '#ff8902',
            '#e9100f',
            '#ad8565',
            '#0078d7',
            '#107c11',
            '#1a1a1a'
        ],
        borderColor: [
            '#ff8902',
            '#e9100f',
            '#ad8565',
            '#0078d7',
            '#107c11',
            '#1a1a1a'
        ],
        borderWidth: 1,
        houverOffset: 4
    }]
};

new Chart(document.getElementById("grafico-barra"), {
    type: 'bar',
    data: data,
    options: {
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
    
const info = {
    labels: [
        'Protagonista',
        'Combatente',
        'Advogado de Regras',
        'Narrador',
        'Suporte',
        'Mestre'
    ],
    datasets: [{
        label: 'teste',
        data: [10,15,8,9,4,3],
        backgroundColor: [
            '#ff8902',
            '#e9100f',
            '#ad8565',
            '#0078d7',
            '#107c11',
            '#1a1a1a'
        ],
        houverOffset: 4
    }]
}

new Chart(document.getElementById("grafico-rosquinha"),{
    type: 'pie',
    data: info,
});

</script>
