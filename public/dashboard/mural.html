<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="./assets/imagens/rpg.png" />
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACERVORPG</title>
 
    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>
 
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>
 
<body style="background-color: #161618;">
 
    <div class="janela">
 
 
        <div class="header-left">
 
            <h1>ACERVORPG</h1>
 
            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>
 
            
            <div class="btn-nav-white">
                <a href="./dashboard.html">
                    <h3>Gráficos</h3>
                </a>
            </div>
            
            <div class="btn-nav-white">
                <a href="Feed.html">
                    <h3>Feed</h3>
                </a>
            </div>
            <div class="btn-nav">
                <h3>Postar</h3>
            </div>
 
            <div class="btn-logout" onclick="sair()">
                <h3>Sair</h3>
            </div>
 
        </div>
 
        <div class="dash-right">
 
 
            <div class="avisos">
                <div id="alerta">
                </div>
                <div class="container">
                    <h1>Publicar</h1>
                    <div class="div-form">
                        <form id="form_postagem" method="post" onsubmit="return publicar()">
                            <label>
                                Título:
                                <br>
                                <input name="titulo" id="titulo" maxlength="100" type="text">
                            </label>
                            <br>
                            <br>
                            <label>
                                Descrição (máximo de 250 caracteres):
                                <br>
                                <textarea name="descricao" id="textarea_descricao" maxlength="250" rows="5"></textarea>
                            </label>
                            <br>
                            <br>
                            <label>
                                URL da imagem (opcional):
                                <br>
                                <input name="imagem" id="imagem" type="text">
                            </label>
                            <br>
                            <br>
                            <button>Enviar</button>
                        </form>
                    </div>
                   
                </div>
            </div>
        </div>
    </div>
 
 
 
 
</body>
 
</html>
 
<script>
    const nome = sessionStorage.NOME_USUARIO;
b_usuario.innerHTML = `${nome}`
    function publicar() {
        const titulo = document.getElementById("titulo").value
        const descricao = document.getElementById("textarea_descricao").value
        const imagem = document.getElementById("imagem").value
        const usuario = sessionStorage.ID_USUARIO
 
        if (titulo.trim() === "" || descricao.trim() === "") {
            console.log("Preencha título e descrição")
            return false
        }
 
        fetch("/feed/postar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                titulo: titulo,
                descricao: descricao,
                imagem: imagem,
                usuario: usuario
            }),
        })
            .then(function (resposta) {
                if (resposta.ok) {
                    document.getElementById("titulo").value = ""
                    document.getElementById("textarea_descricao").value = ""
                    document.getElementById("imagem").value = ""
                    window.location.href = "./Feed.html"
                } else {
                    console.log("Erro ao postar")
                }
            })
            .catch(function (erro) {
                console.log("Erro:", erro)
            })
 
        return false
    }
    function sair() {
        sessionStorage.clear();
        window.location = "../login.html";
    }
    
</script>
